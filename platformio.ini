; PlatformIO Project Configuration File
;
; Smoke tests for each peripheral live in their own src/<name>/ subfolder
; with their own setup()/loop(). One [env:...] section per smoke test
; selects a single subfolder via build_src_filter, so all tests stay
; buildable concurrently. Add a new test by:
;   1. dropping a .cpp in src/smoke_<thing>/
;   2. adding a new [env:smoke_<thing>] block below
;
; Flash a specific test:
;     pio run -e smoke_imu -t upload
;     scripts/flash_and_log.sh smoke_imu 10

[platformio]
default_envs = smoke_imu

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Olimex ESP32-S3-DevKit-LiPo: USB-UART1 enumerates as /dev/cu.usbserial-N
; on this Mac. The numeric suffix churns between replugs; update if pio
; can't find the board. The CH340-class USB-to-serial chip drives
; BOOT/RESET via DTR/RTS, so no manual button mash is needed for upload.
upload_port = /dev/cu.usbserial-110
; CH340 didn't ACK the bump to 921600 (ROM bootloader connected but the
; stub timed out after the rate change). 460800 is a safe ceiling.
upload_speed = 460800
monitor_port = /dev/cu.usbserial-110
monitor_speed = 115200

[env:smoke_imu]
; ICM-20948 (accel + gyro + AK09916 mag) over I2C on the Qwiic header.
build_src_filter = -<*> +<smoke_imu/>

[env:smoke_sd]
; microSD on shared SPI bus (SCK=12, MISO=13, MOSI=11, CS=10).
build_src_filter = -<*> +<smoke_sd/>

[env:smoke_display]
; Adafruit Sharp Memory LCD 2.7" 400x240 on the shared SPI bus.
; SCK=12, MOSI=11 (shared), CS=7 (dedicated). MISO is unused -- the
; Sharp display is write-only but happily shares the bus with the SD card.
build_src_filter = -<*> +<smoke_display/>
lib_deps =
    adafruit/Adafruit SHARP Memory Display @ 1.1.4
    adafruit/Adafruit GFX Library @ 1.12.6

[env:smoke_madgwick]
; Madgwick AHRS fusion on the ICM-20948. Same wiring as smoke_imu --
; no hardware changes needed. Uses the local lib/madgwick implementation.
build_src_filter = -<*> +<smoke_madgwick/>

[env:smoke_mag_cal]
; Hard-iron calibration helper: rotate the device, watch min/max per
; axis converge, copy the offsets back into smoke_madgwick. Same
; wiring as smoke_imu.
build_src_filter = -<*> +<smoke_mag_cal/>
