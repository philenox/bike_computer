; PlatformIO Project Configuration File

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Olimex ESP32-S3-DevKit-LiPo: USB-UART1 enumerates as /dev/cu.usbserial-210
; on this Mac. The board uses a CH340-class USB-to-serial chip that drives
; BOOT/RESET via DTR/RTS, so no manual button mash is needed for upload.
upload_port = /dev/cu.usbserial-210
; CH340-class USB-UART on this board didn't ACK the bump to 921600 — the
; ROM bootloader connected fine but the stub timed out after the rate
; change. 460800 is a safe ceiling for CH340G; raise later if a different
; cable/host combo proves stable.
upload_speed = 460800
monitor_port = /dev/cu.usbserial-210
monitor_speed = 115200
